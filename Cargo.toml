[package]
name = "etac"
version = "0.1.0"
authors = ["Skylar Abruzese"]
edition = "2024"

[build-dependencies] 
lalrpop = "0.23.1"

[dependencies]
generate_tests = { path = "./generate_tests" }
lalrpop-util = { version = "0.21.0", features = ["lexer", "unicode"] }
ariadne = "0.6.0"
clap = { version = "4.5.53", features = ["derive"] }
env_logger = "0.11.8"
log = "0.4.29"
logos = "0.16.0"
pretty = "0.12.5"
similar-asserts = "2.0.0"
unicode-width = "0.2.2"
